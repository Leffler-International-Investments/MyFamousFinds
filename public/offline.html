<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Famous Finds</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8fafc;
      color: #111827;
      padding: 24px;
      text-align: center;
    }
    .wrap { max-width: 400px; }
    h1 {
      font-family: ui-serif, "Times New Roman", serif;
      font-size: 24px;
      margin-bottom: 12px;
    }
    p { font-size: 15px; color: #6b7280; line-height: 1.6; margin-bottom: 20px; }
    button {
      border-radius: 999px;
      background: #111827;
      color: #fff;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/Famous-Finds-Logo.png" alt="Famous Finds" style="height:60px;width:auto;margin-bottom:16px;" />
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
